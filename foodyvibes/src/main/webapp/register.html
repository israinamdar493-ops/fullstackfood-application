<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up - FoodyVibes</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B35;
            --secondary: #FFC107;
            --bg-color: #FFF8F2;
            --text-dark: #1C1C1C;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { 
            background: url('https://images.unsplash.com/photo-1555939594-58d7cb561ad1?q=80&w=2000&auto=format&fit=crop') no-repeat center center/cover;
            min-height: 100vh; display: flex; justify-content: center; align-items: center; position: relative; padding: 40px 0;
        }
        
        body::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(8px);
        }

        .auth-wrapper {
            position: relative; z-index: 1; display: flex; max-width: 1000px; width: 90%;
            background: rgba(255, 255, 255, 0.1); border-radius: 20px; overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3); backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
            animation: fadeIn 0.6s ease-out;
        }

        .auth-banner {
            flex: 1; background: linear-gradient(135deg, rgba(255,107,53,0.9), rgba(229,57,53,0.9)), url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=800') center/cover;
            padding: 50px; display: flex; flex-direction: column; justify-content: center; color: #fff;
        }
        
        .auth-banner h1 { font-size: 42px; font-weight: 800; margin-bottom: 20px; line-height: 1.2; }
        .auth-banner p { font-size: 16px; font-weight: 300; opacity: 0.9; line-height: 1.6; }

        .auth-form-container {
            flex: 1.2; background: #fff; padding: 50px; display: flex; flex-direction: column; justify-content: center;
        }

        .brand { font-size: 24px; font-weight: 800; color: var(--primary); display: flex; align-items: center; gap: 8px; margin-bottom: 30px; text-decoration: none; }

        .auth-header { margin-bottom: 30px; }
        .auth-header h2 { font-size: 28px; font-weight: 700; color: var(--text-dark); margin-bottom: 5px; }
        .auth-header p { font-size: 14px; color: #6B6B6B; }
        .auth-header a { color: var(--primary); text-decoration: none; font-weight: 600; transition: color 0.3s; }
        .auth-header a:hover { color: #e45a24; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full-width { grid-column: 1 / -1; }

        .form-group { margin-bottom: 20px; position: relative; }
        .form-group label { display: block; font-size: 13px; color: #6B6B6B; margin-bottom: 8px; font-weight: 500; }
        
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper i.icon { position: absolute; left: 15px; color: #a0a0a0; font-size: 18px; transition: color 0.3s; }
        
        .form-group input { 
            width: 100%; padding: 14px 15px 14px 45px; 
            border: 1.5px solid #e9e9eb; border-radius: 12px; font-size: 15px; 
            outline: none; transition: all 0.3s; background: #fafafa;
        }
        .form-group input:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px rgba(255,107,53,0.1); }
        .form-group input:focus + i.icon { color: var(--primary); }
        
        .toggle-pwd { position: absolute; right: 15px; cursor: pointer; color: #a0a0a0; font-size: 18px; transition: color 0.3s; }
        .toggle-pwd:hover { color: var(--text-dark); }

        .btn-submit { 
            width: 100%; padding: 15px; background: var(--primary); color: white; 
            border: none; border-radius: 12px; font-size: 16px; font-weight: 600; 
            cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 15px rgba(255,107,53,0.3);
            margin-top: 10px;
        }
        .btn-submit:hover { background: #e45a24; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,107,53,0.4); }
        
        .terms { font-size: 12px; color: #a0a0a0; margin-top: 25px; text-align: center; }
        .terms a { color: var(--text-dark); text-decoration: none; font-weight: 500; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        @media (max-width: 768px) {
            .auth-wrapper { flex-direction: column; width: 95%; }
            .auth-banner { padding: 40px 30px; display: none; /* Hide banner on mobile to save space */ }
            .auth-form-container { padding: 40px 30px; }
            .form-grid { grid-template-columns: 1fr; gap: 0; }
        }
    </style>
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-banner">
            <h1>Join the Foody Family!</h1>
            <p>Create an account to unlock exclusive offers, faster checkouts, and discover the best food in town.</p>
        </div>
        
        <div class="auth-form-container">
            <a href="restaurants" class="brand"><i class="fa-solid fa-fire-burner"></i> FoodyVibes</a>
            
            <div class="auth-header">
                <h2>Sign Up</h2>
                <p>Already have an account? <a href="login.html">Log in here</a></p>
            </div>

            <form action="registerServlet" method="POST">
                
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label>Full Name</label>
                        <div class="input-wrapper">
                            <input type="text" name="username" placeholder="John Doe" required>
                            <i class="fa-regular fa-user icon"></i>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Email Address</label>
                        <div class="input-wrapper">
                            <input type="email" name="email" placeholder="john@example.com" required>
                            <i class="fa-regular fa-envelope icon"></i>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Password</label>
                        <div class="input-wrapper">
                            <input type="password" name="password" id="pwd" placeholder="Create a password" required>
                            <i class="fa-solid fa-lock icon"></i>
                            <i class="fa-regular fa-eye toggle-pwd" onclick="togglePassword()"></i>
                        </div>
                    </div>
                    
                    <div class="form-group full-width">
                        <label>Delivery Address (Optional)</label>
                        <div class="input-wrapper">
                            <input type="text" name="address" placeholder="123 Food Street, City...">
                            <i class="fa-solid fa-location-dot icon"></i>
                        </div>
                    </div>
                </div>
                
                <button type="submit" class="btn-submit">Create Account</button>
            </form>

            <p class="terms">By signing up, I accept the <a href="#">Terms & Conditions</a> & <a href="#">Privacy Policy</a></p>
        </div>
    </div>

    <script>
        function togglePassword() {
            const pwdInput = document.getElementById('pwd');
            const toggleIcon = document.querySelector('.toggle-pwd');
            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                toggleIcon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                pwdInput.type = 'password';
                toggleIcon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>
</body>
</html>
